# Ruff configuration for home-ai-control-plane
# https://docs.astral.sh/ruff/configuration/

target-version = "py314"

# All Python source lives here
src = [
    "services",
    "agents",
    "contracts",
    "scripts",
]

exclude = [
    ".git",
    "__pycache__",
    "*.egg-info",
    ".venv",
    "infra",
]

line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (undefined names, unused imports, etc.)
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (modernise syntax for Python 3.14)
    "B",   # flake8-bugbear (likely bugs and design issues)
    "C4",  # flake8-comprehensions (unnecessary list/dict/set calls)
    "SIM", # flake8-simplify (simplifiable code)
    "TID", # flake8-tidy-imports (banned relative imports)
    "RUF", # ruff-specific rules
]

ignore = [
    "E501",   # line too long – handled by formatter
    "B008",   # do not perform function calls in default arguments (FastAPI Depends pattern)
    "SIM108", # ternary operator – sometimes less readable
    "SIM117", # nested with statements – fine in asyncio code
]

[lint.isort]
known-first-party = ["app", "contracts"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
